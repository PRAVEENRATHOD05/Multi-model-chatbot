<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant.AI</title>
    <link rel="stylesheet" href="praveen.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <h2>Chatbot Options</h2>
            <ul>
                <li id="toggle-history">Chat History</li>
            </ul>
            <div id="chat-history" class="hidden">
                <h3>Chat History</h3>
                <ul id="history-list"></ul>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-container">
            <div class="header">
                <h1>Surpac.ai</h1>
                <button id="toggle-sidebar">☰</button>
            </div>

            <div class="chat-section" id="chat-section"></div>

            <!-- Chat Input Area -->
            <div class="chat-input-container">
                <div class="chat-input-wrapper">
                    <!-- File Upload (left side inside the input) -->
                    <label for="file-upload" class="file-upload-label">⭐</label>
                    <input type="file" id="file-upload" class="file-upload" />

                    <!-- Input field -->
                    <input type="text" id="user-input" placeholder="Type your message..." />

                    <!-- Send Button (right side inside the input) -->
                    <button id="send-btn" class="send-btn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script src="praveen.js"></script>
</body>
</html>
